; ============================================================
; PlatformIO project configuration — PulseMonitor ECG Node
; Board : ESP32-S3-DevKitC-1-N8R8 (Board B — ECG peripheral)
; MCU   : ESP32-S3 @ 240 MHz, 512 KB SRAM, 8 MB Flash, 8 MB OPI PSRAM
; ============================================================
[platformio]
default_envs = esp32s3_ecg

; ---- Common settings shared by all envs --------------------
[common]
platform             = espressif32
board                = esp32-s3-devkitc-1
framework            = arduino, espidf
monitor_speed        = 115200
upload_speed         = 115200
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0


; ============================================================
; Production Build — Full BLE + ECG DSP + AI inference
; ============================================================
[env:esp32s3_ecg]
extends              = common
monitor_filters      = esp32_exception_decoder
upload_speed         = 115200
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DNDEBUG
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DUSE_LEGACY_TFLITE_ESP32
    -Wno-error=implicit-function-declaration
    -O0
    -fno-strict-aliasing
    -fno-tree-vectorize
    -fno-tree-slp-vectorize
    -fno-optimize-sibling-calls
lib_deps =
    ${common.lib_deps}
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0
    h2zero/NimBLE-Arduino @ ^1.4.2

; ============================================================
; Stream Test Build — BLE disabled, AI-only for latency/accuracy
; ============================================================
[env:stream_test]
extends              = common
board                = esp32-s3-devkitc-1
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DSTREAM_TEST_BUILD
    -DUSE_LEGACY_TFLITE_ESP32
lib_deps =
    ${common.lib_deps}
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0

; ============================================================
; Optimized Build (In Progress) — ESP-NN Hardware Acceleration
; ============================================================
[env:stream_test_nn]
extends              = common
board                = esp32-s3-devkitc-1
board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components_opt
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DSTREAM_TEST_BUILD
    -I${PROJECT_DIR}/components_opt/esp-tflite-micro
    -I${PROJECT_DIR}/components_opt/esp-tflite-micro/third_party/flatbuffers/include
    -I${PROJECT_DIR}/components_opt/esp-tflite-micro/third_party/gemmlowp
    -I${PROJECT_DIR}/components_opt/esp-tflite-micro/third_party/ruy
    -I${PROJECT_DIR}/components_opt/esp-nn/include
    -DESP_NN
lib_deps =
    ${common.lib_deps}
