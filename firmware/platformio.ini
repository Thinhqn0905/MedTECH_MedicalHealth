; ============================================================
; PlatformIO project configuration — PulseMonitor ESP32-S3
; Board : ESP32-S3-DevKitC-1 (or compatible)
; MCU   : ESP32-S3 @ 240 MHz, 512 KB SRAM, 8 MB Flash (typical)
; ============================================================
[platformio]
default_envs = esp32s3

[env:esp32s3]
platform             = espressif32
board                = esp32-s3-devkitc-1
framework            = arduino

; ---- Serial monitor ----------------------------------------
monitor_speed        = 115200
monitor_filters      = esp32_exception_decoder

; ---- Flash settings ----------------------------------------
upload_speed         = 460800
upload_port          = COM5               ; Change to your COM port

; ---- Partition scheme: 4 MB app + 4 MB SPIFFS ---------------
board_build.partitions = default_8MB.csv

; ---- Build flags -------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Uncomment to enable WiFi/WebSocket mode:
    ; -DUSE_WIFI

; ---- Library dependencies ----------------------------------
lib_deps =
    ; MAX3010x sensor driver (SparkFun)
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    ; JSON serialisation (ArduinoJson v7 — header-only)
    bblanchon/ArduinoJson @ ^7.2.0
    ; WebSocket server (only needed when USE_WIFI is defined)
    links2004/WebSockets @ ^2.4.1

; ---- Code paths --------------------------------------------
src_dir  = src
include_dir = include

; ============================================================
; Optional: native unit-test environment (host-side)
; ============================================================
[env:native_test]
platform = native
build_flags = -std=c++17
test_build_src = yes
